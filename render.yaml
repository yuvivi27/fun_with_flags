databases:
  - name: flags-trivia-db
    plan: free
    databaseName: flags_trivia
    user: flags_trivia_user

services:
  - type: web
    name: flags-trivia-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --frozen-lockfile --prod=false && pnpm --filter api exec prisma generate --schema prisma/schema.prisma && pnpm --filter api build
    startCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm --filter api exec prisma migrate deploy && pnpm --filter api start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flags-trivia-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.12.0"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
