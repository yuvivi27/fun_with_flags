databases:
  - name: flags-trivia-db
    plan: free
    databaseName: flags_trivia
    user: flags_trivia_user

services:
  - type: web
    name: flags-trivia-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api exec prisma migrate deploy && pnpm --filter api start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flags-trivia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
